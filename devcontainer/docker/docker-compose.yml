services:
  dev:
    env_file:
      - ../env-vars/.env.runtime
      - ../env-vars/.env.secrets.runtime
    image: ${DEV_CONTAINER_IMAGE_NAME}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DEVCONTAINER_OS_IMAGE: ${DEVCONTAINER_OS_IMAGE}
        USER_UID: ${UID}
        USER_GID: ${GID}
        DEV_USER_PASSWORD: ${DEV_USER_PASSWORD}
        RETRY_ATTEMPTS: ${RETRY_ATTEMPTS}
        RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS}
        DEV_ENV_LOCKED: ${DEV_ENV_LOCKED}
        BASE_BINARIES_LOCKED: ${BASE_BINARIES_LOCKED}
        ENABLE_USER_CONFIG: ${ENABLE_USER_CONFIG}
        ENABLE_JUPYTER_SETTINGS: ${ENABLE_JUPYTER_SETTINGS}
        ENABLE_PYTHON_ENV: ${ENABLE_PYTHON_ENV}
        ENABLE_R_ENV: ${ENABLE_R_ENV}
        ENABLE_TEXLIVE: ${ENABLE_TEXLIVE}
        ENABLE_QUARTO: ${ENABLE_QUARTO}
        PYTHON_VERSION: ${PYTHON_VERSION}
        R_BASE_VERSION: ${R_BASE_VERSION}
        FLOWER_PYTHON_VERSION: ${FLOWER_PYTHON_VERSION}
        DOTFILES_REPO: ${DOTFILES_REPO}
        ENABLE_GIT_IDENTITY: ${ENABLE_GIT_IDENTITY}
        GIT_USER_NAME: ${GIT_USER_NAME}
        GIT_USER_EMAIL: ${GIT_USER_EMAIL}
    volumes:
      - ../..:/home/dev/dev_container
    working_dir: /home/dev/dev_container
    tty: true
    stdin_open: true
    ports:
      - "${JUPYTER_PORT}:${JUPYTER_PORT}" # Expose JupyterLab port (host:container)
      - "${QUARTO_PORT}:${QUARTO_PORT}" # Expose Quarto preview port (host:container)
      - "${WEB_APP_PORT}:${WEB_APP_PORT}" # Expose web application dev server port (host:container)
    container_name: ${DEV_CONTAINER_NAME}
